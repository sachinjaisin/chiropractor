<!DOCTYPE html>
<html lang="en">
<head>
  <title>Chiropractor</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" type="text/css" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" type="text/css" href="assets/css/style.css">
    <link rel="stylesheet" type="text/css" href="assets/css/font-awesome.min.css">
    <link rel="stylesheet" type="text/css" href="assets/css/responsive.css">
    <link rel="stylesheet" type="text/css" href="assets/css/line-awesome.min.css"> 
</head>
<body class="signbg">

  <section class="login-sec patient-referral">
      <a href="#" class="loginlogo"><img src="assets/images/logo.png" class="img-fluid" alt=""></a>
     <div class="login-bg">
      <div class="loginheading">        
        <h1>Practitioner Profile Completion</h1>
         <p>Please provide your practice and professional information.</p>
      </div>
      <form class="formdesign">
        <div class="forminner-heading">
          <h2>Practice Information</h2>
        </div>
        <div class="form-group">
          <label>Practice Name </label>
          <input type="text" class="form-control" placeholder="" id="">
        </div>
        <div class="row">
          <div class="col-md-6">
            <div class="form-group">
              <label>Street Address </label>
              <input type="text" class="form-control" placeholder="" id="">
            </div> 
          </div>
          <div class="col-md-6">
            <div class="form-group">
              <label>City</label>
              <input type="text" class="form-control" placeholder="" id="">
            </div>
          </div>
        </div>
        <div class="row">
          <div class="col-md-6">
            <div class="form-group">
              <label>State</label>
              <input type="text" class="form-control" placeholder="" id="">
            </div> 
          </div>
          <div class="col-md-6">
            <div class="form-group">
              <label>ZIP Code</label>
              <input type="text" class="form-control" placeholder="" id="">
            </div>
          </div>
        </div>
        <div class="row">
          <div class="col-md-4">
            <div class="form-group">
              <label>Practice Email</label>
              <input type="email" class="form-control" placeholder="" id="">
            </div>
          </div>
          <div class="col-md-4">
            <div class="form-group">
              <label>Practice Phone</label>
              <input type="text" class="form-control" placeholder="" id="">
            </div>
          </div>
          <div class="col-md-4">
            <div class="form-group">
              <label>Website</label>
              <input type="text" class="form-control" placeholder="" id="">
            </div>
          </div>
        </div>
        <div class="forminner-heading">
          <h2>Professional Information</h2>
        </div>
        <div class="form-group">
          <label>Bio</label>
          <textarea class="form-control" rows="3" id="comment" name="text" placeholder=""></textarea>
        </div>
        <div class="row">
          <div class="col-md-6">
            <div class="form-group">
              <label>Years of Experience</label>
              <input type="text" class="form-control" placeholder="" id="">
            </div> 
          </div>
          <div class="col-md-6">
            <div class="form-group">
              <label>Languages Spoken</label>
              <input type="text" class="form-control" placeholder="" id="">
            </div>
          </div>
        </div>
        <div class="forminner-heading">
          <h2>Coverage Information</h2>
        </div>
        <div class="row">
          <div class="col-md-6">
            <div class="form-group">
              <label>Service Radius (km)</label>
              <input type="text" class="form-control" placeholder="" id="">
            </div> 
          </div>
          <div class="col-md-6">
            <div class="form-group">
              <label>Areas Served</label>
              <input type="text" class="form-control" placeholder="" id="">
            </div>
          </div>
        </div>
        <div class="form-group">
          <label>Specialties</label>
          <ul class="radiolist-ul">
            <li>
              <div class="form-check">
                <input type="checkbox" id="checklist1" class="form-check-input">
                <label class="form-check-label" for="checklist1">Back Pain</label>
              </div>
            </li>
            <li>
              <div class="form-check">
                <input type="checkbox" id="checklist2" class="form-check-input">
                <label class="form-check-label" for="checklist2">Neck Pain</label>
              </div>
            </li>
            <li>
              <div class="form-check">
                <input type="checkbox" id="checklist3" class="form-check-input">
                <label class="form-check-label" for="checklist3">Headaches/Migraine</label>
              </div>
            </li>
            <li>
              <div class="form-check">
                <input type="checkbox" id="checklist4" class="form-check-input">
                <label class="form-check-label" for="checklist4">Pregnancy Care</label>
              </div>
            </li>
            <li>
              <div class="form-check">
                <input type="checkbox" id="checklist5" class="form-check-input">
                <label class="form-check-label" for="checklist5">Pediatrics</label>
              </div>
            </li>
            <li>
              <div class="form-check">
                <input type="checkbox" id="checklist6" class="form-check-input">
                <label class="form-check-label" for="checklist6">Tinnitus</label>
              </div>
            </li>
            <li>
              <div class="form-check">
                <input type="checkbox" id="checklist7" class="form-check-input">
                <label class="form-check-label" for="checklist7">Wellness Care</label>
              </div>
            </li>
            <li>
              <div class="form-check">
                <input type="checkbox" id="checklist8" class="form-check-input">
                <label class="form-check-label" for="checklist8">Other</label>
              </div>
            </li>
          </ul>
        </div>
        <div class="btn-right">
          <input type="button" class="btn btn-info" value="Save Profile" id="">
        </div>
         
            
      </form>      
     </div>
  </section>





<script src="assets/js/jquery.min.js"></script>
<script src="assets/js/bootstrap.bundle.min.js"></script>

</body>
</html>
