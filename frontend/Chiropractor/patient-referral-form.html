<!DOCTYPE html>
<html lang="en">
<head>
  <title>Chiropractor</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" type="text/css" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" type="text/css" href="assets/css/style.css">
    <link rel="stylesheet" type="text/css" href="assets/css/font-awesome.min.css">
    <link rel="stylesheet" type="text/css" href="assets/css/responsive.css">
    <link rel="stylesheet" type="text/css" href="assets/css/line-awesome.min.css"> 
</head>
<body class="signbg">

  <section class="login-sec patient-referral">
      <a href="#" class="loginlogo"><img src="assets/images/logo.png" class="img-fluid" alt=""></a>
     <div class="login-bg">
      <div class="loginheading">        
        <h1>Patient Referral Form</h1>
         <p>Fill out the form below and we will match the patient with a qualified Chiropractor in their area.</p>
      </div>
      <form class="formdesign">
        <div class="forminner-heading">
          <h2>Patient Information</h2>
        </div>
        <div class="row">
          <div class="col-md-6">
            <div class="form-group">
              <label>First Name</label>
              <input type="text" class="form-control" placeholder="" id="">
            </div> 
          </div>
          <div class="col-md-6">
            <div class="form-group">
              <label>Last Name</label>
              <input type="text" class="form-control" placeholder="" id="">
            </div>
          </div>
        </div>
        <div class="row">
          <div class="col-md-4">
            <div class="form-group">
              <label>Email Address</label>
              <input type="email" class="form-control" placeholder="Enter email address" id="">
            </div> 
          </div>
          <div class="col-md-4">
            <div class="form-group">
              <label>Phone Number</label>
              <input type="text" class="form-control" placeholder="Enter phone number" id="">
            </div>
          </div>
          <div class="col-md-4">
            <div class="form-group">
              <label>Street Address</label>
              <input type="text" class="form-control" placeholder="" id="">
            </div>
          </div>
        </div>
        <div class="row">          
          <div class="col-md-4">
            <div class="form-group">
              <label>City</label>
              <input type="text" class="form-control" placeholder="" id="">
            </div>
          </div>
          <div class="col-md-4">
            <div class="form-group">
              <label>State</label>
              <input type="text" class="form-control" placeholder="" id="">
            </div>
          </div>
          <div class="col-md-4">
            <div class="form-group">
              <label>ZIP Code</label>
              <input type="text" class="form-control" placeholder="" id="">
            </div>
          </div>
        </div>
        <div class="forminner-heading">
          <h2>Referral Details</h2>
        </div>
        <div class="row">
          <div class="col-md-6">
            <div class="form-group">
              <label>Primary Complaint</label>
              <textarea class="form-control" rows="3" id="comment" name="text" placeholder=""></textarea>
            </div>
          </div>
          <div class="col-md-6">
            <div class="form-group">
              <label>Symptoms</label>
              <textarea class="form-control" rows="3" id="comment" name="text" placeholder=""></textarea>
            </div>
          </div>
        </div>
        <div class="form-group">
          <label>What issues are you experiencing?</label>
          <ul class="radiolist-ul">
            <li>
              <div class="form-check">
                <input type="checkbox" id="checklist1" class="form-check-input">
                <label class="form-check-label" for="checklist1">Back Pain</label>
              </div>
            </li>
            <li>
              <div class="form-check">
                <input type="checkbox" id="checklist2" class="form-check-input">
                <label class="form-check-label" for="checklist2">Neck Pain</label>
              </div>
            </li>
            <li>
              <div class="form-check">
                <input type="checkbox" id="checklist3" class="form-check-input">
                <label class="form-check-label" for="checklist3">Headaches/Migraine</label>
              </div>
            </li>
            <li>
              <div class="form-check">
                <input type="checkbox" id="checklist4" class="form-check-input">
                <label class="form-check-label" for="checklist4">Pregnancy Care</label>
              </div>
            </li>
            <li>
              <div class="form-check">
                <input type="checkbox" id="checklist5" class="form-check-input">
                <label class="form-check-label" for="checklist5">Pediatrics</label>
              </div>
            </li>
            <li>
              <div class="form-check">
                <input type="checkbox" id="checklist6" class="form-check-input">
                <label class="form-check-label" for="checklist6">Tinnitus</label>
              </div>
            </li>
            <li>
              <div class="form-check">
                <input type="checkbox" id="checklist7" class="form-check-input">
                <label class="form-check-label" for="checklist7">Wellness Care</label>
              </div>
            </li>
            <li>
              <div class="form-check">
                <input type="checkbox" id="checklist8" class="form-check-input">
                <label class="form-check-label" for="checklist8">Other</label>
              </div>
            </li>
          </ul>
        </div>
        <div class="form-group">
          <label>Duration of Problem</label>
          <input type="text" class="form-control" placeholder="" id="">
        </div>
        <div class="form-group">
            <label>Urgency Level</label>
            <ul class="radiolist-ul">
              <li>
                <div class="form-check">
                  <input type="radio" id="radiolist1" name="radiolist1" class="form-check-input">
                  <label class="form-check-label" for="radiolist1">Low</label>
                </div>
              </li>
              <li>
                <div class="form-check">
                  <input type="radio" id="radiolist2" name="radiolist1" class="form-check-input">
                  <label class="form-check-label" for="radiolist2">Normal</label>
                </div>
              </li>
              <li>
                <div class="form-check">
                  <input type="radio" id="radiolist3" name="radiolist1" class="form-check-input">
                  <label class="form-check-label" for="radiolist3">High</label>
                </div>
              </li>
              <li>
                <div class="form-check">
                  <input type="radio" id="radiolist4" name="radiolist1" class="form-check-input">
                  <label class="form-check-label" for="radiolist4">Urgent</label>
                </div>
              </li>
            </ul>
        </div>
        <div class="form-group">
          <label>Preferred Contact</label>
          <input type="text" class="form-control" placeholder="" id="">
        </div>
        <div class="form-group">
          <label>Additional Notes</label>
          <textarea class="form-control" rows="3" id="comment" name="text" placeholder=""></textarea>
        </div>
        <div class="btn-right">
          <input type="button" class="btn btn-info" value="Submit Referral" id="">
        </div>
       
            
      </form>      
     </div>
  </section>





<script src="assets/js/jquery.min.js"></script>
<script src="assets/js/bootstrap.bundle.min.js"></script>

</body>
</html>
