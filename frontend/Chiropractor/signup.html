<!DOCTYPE html>
<html lang="en">
<head>
  <title>Chiropractor</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" type="text/css" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" type="text/css" href="assets/css/style.css">
    <link rel="stylesheet" type="text/css" href="assets/css/font-awesome.min.css">
    <link rel="stylesheet" type="text/css" href="assets/css/responsive.css">
    <link rel="stylesheet" type="text/css" href="assets/css/line-awesome.min.css"> 
</head>
<body class="signbg">

  <section class="login-sec">
      <a href="#" class="loginlogo"><img src="assets/images/logo.png" class="img-fluid" alt=""></a>
     <div class="login-bg">
      <div class="loginheading">        
        <h1>Chiropractor Registration</h1>
         <p>Create your account to join our trusted referral network.</p>
      </div>
      <form class="formdesign">
        <div class="row">
          <div class="col-md-6">
            <div class="form-group">
              <label>First Name</label>
              <input type="text" class="form-control" placeholder="Enter first name" id="">
            </div> 
          </div>
          <div class="col-md-6">
            <div class="form-group">
              <label>Last Name</label>
              <input type="text" class="form-control" placeholder="Enter last name" id="">
            </div>
          </div>
        </div>
        <div class="row">
          <div class="col-md-6">
            <div class="form-group">
              <label>Email Address</label>
              <input type="email" class="form-control" placeholder="Enter email address" id="">
            </div> 
          </div>
          <div class="col-md-6">
            <div class="form-group">
              <label>Phone Number</label>
              <input type="text" class="form-control" placeholder="Enter phone number" id="">
            </div>
          </div>
        </div>
        <div class="row">
          <div class="col-md-6">
            <div class="form-group">
              <label>Password</label>
              <input type="text" class="form-control" placeholder="Enter password" id="">
            </div>
          </div>
          <div class="col-md-6">
            <div class="form-group">
              <label>Confirm Password</label>
              <input type="text" class="form-control" placeholder="Confirm password" id="">
            </div>
          </div>
        </div>
          <div class="form-group form-check">
            <label class="form-check-label">
              <input class="form-check-input" type="checkbox" name="remember">I agree with <a href="#">Terms of Use</a> and <a href="#">Privacy Policy</a>.
            </label>
          </div>
          <input type="button" class="btn btn-info w-100" value="Create Account" id="">
          <div class="dontaccountdiv">
          <p class="dontaccount">Already have an account? <a href="signin.html">Sign In</a></p>
          <p class="dontaccount">Are you a patient? <a href="signin.html">Submit a Referral</a></p>
          </div>
            
      </form>      
     </div>
  </section>





<script src="assets/js/jquery.min.js"></script>
<script src="assets/js/bootstrap.bundle.min.js"></script>

</body>
</html>
