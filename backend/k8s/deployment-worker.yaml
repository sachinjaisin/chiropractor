apiVersion: apps/v1
kind: Deployment
metadata:
  name: bullmq-workers
  namespace: chiroreferral
  labels:
    app: worker
    component: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: worker
        component: worker
    spec:
      serviceAccountName: worker-sa
      securityContext:
        runAsNonRoot: true
        runAsUser:    1001
      terminationGracePeriodSeconds: 60  # Allow in-flight jobs to finish
      containers:
        - name: worker
          image: ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/chiroreferral-api:latest
          command: ["node", "dist/worker.js"]
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          resources:
            requests:
              cpu:    250m
              memory: 512Mi
            limits:
              cpu:    1000m
              memory: 1Gi
          livenessProbe:
            exec:
              command: ["node", "-e", "process.exit(0)"]
            initialDelaySeconds: 30
            periodSeconds:       60
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem:   true
            capabilities:
              drop: [ALL]
