apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: app-secrets
  namespace: chiroreferral
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: app-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: chiroreferral/prod/database-url
    - secretKey: REDIS_URL
      remoteRef:
        key: chiroreferral/prod/redis-url
    - secretKey: REDIS_QUEUE_URL
      remoteRef:
        key: chiroreferral/prod/redis-queue-url
    - secretKey: JWT_SECRET
      remoteRef:
        key: chiroreferral/prod/jwt-secret
    - secretKey: STRIPE_SECRET_KEY
      remoteRef:
        key: chiroreferral/prod/stripe-secret-key
    - secretKey: STRIPE_WEBHOOK_SECRET
      remoteRef:
        key: chiroreferral/prod/stripe-webhook-secret
    - secretKey: SENDGRID_API_KEY
      remoteRef:
        key: chiroreferral/prod/sendgrid-api-key
    - secretKey: SENDGRID_FROM_EMAIL
      remoteRef:
        key: chiroreferral/prod/sendgrid-from-email
    - secretKey: GOOGLE_MAPS_API_KEY
      remoteRef:
        key: chiroreferral/prod/google-maps-api-key
    - secretKey: FEEDBACK_TOKEN_SECRET
      remoteRef:
        key: chiroreferral/prod/feedback-token-secret
