apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: chiroreferral
  labels:
    app: api
    component: server
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 2
  template:
    metadata:
      labels:
        app: api
        component: server
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "9090"
        prometheus.io/path:   "/metrics"
    spec:
      serviceAccountName: api-sa
      securityContext:
        runAsNonRoot: true
        runAsUser:    1001
        fsGroup:      1001
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 30
      containers:
        - name: api
          image: ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/chiroreferral-api:latest
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          resources:
            requests:
              cpu:    250m
              memory: 512Mi
            limits:
              cpu:    1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 15
            periodSeconds:       30
            failureThreshold:    3
            timeoutSeconds:      5
          readinessProbe:
            httpGet:
              path: /readyz
              port: 3000
            initialDelaySeconds: 10
            periodSeconds:       10
            failureThreshold:    3
            timeoutSeconds:      5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem:   true
            capabilities:
              drop: [ALL]
      topologySpreadConstraints:
        - maxSkew:            1
          topologyKey:        topology.kubernetes.io/zone
          whenUnsatisfiable:  DoNotSchedule
          labelSelector:
            matchLabels:
              app: api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-canary
  namespace: chiroreferral
  labels:
    app: api
    component: server
    track: canary
spec:
  replicas: 0   # Scaled up during canary deploys
  selector:
    matchLabels:
      app: api
      track: canary
  template:
    metadata:
      labels:
        app: api
        component: server
        track: canary
    spec:
      serviceAccountName: api-sa
      securityContext:
        runAsNonRoot: true
        runAsUser:    1001
      containers:
        - name: api
          image: ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/chiroreferral-api:latest
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          resources:
            requests:
              cpu:    250m
              memory: 512Mi
            limits:
              cpu:    1000m
              memory: 1Gi
          livenessProbe:
            httpGet: { path: /healthz, port: 3000 }
            initialDelaySeconds: 15
            periodSeconds:       30
          readinessProbe:
            httpGet: { path: /readyz, port: 3000 }
            initialDelaySeconds: 10
            periodSeconds:       10
