apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: chiroreferral
data:
  NODE_ENV:           production
  PORT:               "3000"
  LOG_LEVEL:          info
  AWS_REGION:         us-east-1
  S3_BUCKET_DOCUMENTS: chiroreferral-documents-prod
  RATE_LIMIT_MAX:     "300"
  RATE_LIMIT_WINDOW_MS: "60000"
